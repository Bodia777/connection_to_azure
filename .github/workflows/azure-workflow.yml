name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - main

env:
  ACR_NAME: ${{ vars.ACR_NAME }}
  RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP }}
  ENV_NAME: ${{ vars.ENV_NAME }}

jobs:
  build-and-deploy:
    environment: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR Login
        run: az acr login --name $ACR_NAME

      - name: Build Backend
        run: |
          docker build -t $ACR_NAME.azurecr.io/back ./back
          docker push $ACR_NAME.azurecr.io/back

      - name: Inject frontend environment
        run: |
          mkdir -p front/src/environments
          
          echo "export const environment = {" > front/src/environments/environment.ts
          echo "  production: $([ \"${{ vars.PRODUCTION }}\" = \"true\" ] && echo true || echo false)," >> front/src/environments/environment.ts
          echo "  defaultLocale: \"${{ vars.DEFAULT_LOCALE }}\"," >> front/src/environments/environment.ts
          echo "  baseUrl: \"${{ vars.BASE_URL }}\"," >> front/src/environments/environment.ts
          echo "  frontUrl: \"${{ vars.FRONT_URL }}\"" >> front/src/environments/environment.ts
          echo "};" >> front/src/environments/environment.ts

      - name: Debug Redis
        run: |
          echo "REDIS_HOST=${{ secrets.REDIS_HOST }}"    
          echo "REDIS_PORT=${{ vars.REDIS_PORT }}"
          

      - name: Build Frontend
        run: |
          docker build \
            -f ./front/Dockerfile.prod \
            -t $ACR_NAME.azurecr.io/front \
            ./front
          
          docker push $ACR_NAME.azurecr.io/front

      - name: Create Container Apps Environment
        run: |
          az containerapp env create \
            --name $ENV_NAME \
            --resource-group $RESOURCE_GROUP \
            --location westeurope || true

      - name: Deploy Backend
        run: |
          az containerapp update \
            --name backend-app \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_NAME.azurecr.io/back \
            --set-env-vars \
              ORIGIN_WHITE_LIST=${{ secrets.ORIGIN_WHITE_LIST }} \
              SERVER_PORT=${{ secrets.SERVER_PORT }} \
              DB_HOST=${{ secrets.DB_HOST }} \
              DB_PORT=${{ vars.DB_PORT }} \
              DB_USER=${{ secrets.DB_USER }} \
              DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              DB_NAME=${{ secrets.DB_NAME }} \
              REDIS_HOST=${{ secrets.REDIS_HOST }} \
              REDIS_PORT=${{ vars.REDIS_PORT }} \
              REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
#          az containerapp create \
#            --name backend-app \
#            --resource-group $RESOURCE_GROUP \
#            --environment $ENV_NAME \
#            --image $ACR_NAME.azurecr.io/back \
#            --target-port 3000 \
#            --ingress external \
#            --registry-server $ACR_NAME.azurecr.io \
#            --registry-username $(az acr credential show --name $ACR_NAME --query username -o tsv) \
#            --registry-password $(az acr credential show --name $ACR_NAME --query passwords[0].value -o tsv)

      - name: Deploy Frontend
        run: |
          az containerapp update \
            --name frontend-app \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_NAME.azurecr.io/front \
